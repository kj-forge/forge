name: Linear Release

on:
  push:
    branches: [main, staging, production]
  workflow_dispatch:
    inputs:
      action:
        description: "Manual action: sync | update | complete"
        required: true
        default: sync
        type: choice
        options: [sync, update, complete]

permissions:
  contents: read

# Pattern adapted from Gigaverse's release pipeline:
#   https://linear.app/gigaverse/document/linear-release-process-main-staging-production-b411d31239e4
#
# Stages in the Linear pipeline "Forge Web":
#   Planned → Started → In dev → In staging (frozen) → Released
#
# Triggers:
#   push main       → linear-release sync (issues to "In dev")
#   push staging    → linear-release sync + update --stage "In staging" (freezes the release)
#   push production → linear-release complete (issues to "Released")
#
# Setup needed before this workflow can run:
#   1. Create the "Forge Web" pipeline in Linear: Settings → Releases → New pipeline
#   2. Stage names: keep "Started" / "Released" as system stages; create "In dev" and "In staging"
#      with the exact strings used below.
#   3. Generate a pipeline access key in Linear and add it as repo secret LINEAR_ACCESS_KEY.
#   4. After cutting a release (push to staging), manually rename the auto-generated
#      "Release N" in Linear UI to "Release {current_cycle_number}" to keep naming consistent.

jobs:
  release:
    name: Sync Linear release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

