name: CI

on:
  pull_request:
  push:
    branches: [main, staging, production]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Note on `bun run build` as a prereq step:
# `src/routeTree.gen.ts` is auto-generated by `@tanstack/router-plugin/vite`
# during the Vite build and is gitignored. Without it, both typecheck and
# unit tests fail (the file is imported from `src/router.tsx` and the route
# tree types power `createFileRoute(...)`). There is no standalone TanStack
# Router generator CLI, so the cheapest reliable way to materialize the file
# in CI is to run `bun run build` first in each job that needs it.

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - run: bun run typecheck

  unit:
    name: Unit tests (Bun test + happy-dom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - run: bun run test

  e2e:
    name: E2E tests (Playwright, mobile viewports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Skipped until Playwright is added (planned: a later PR after MVP).
      # - run: bun install
      # - run: bunx playwright install --with-deps
      # - run: bun run test:e2e
      - run: echo "Skipping E2E — Playwright will be added after MVP."

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
